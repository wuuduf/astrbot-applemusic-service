media-user-token: "your-media-user-token" # If you need lyrics/aac-lc/station/MV, set this
authorization-token: "your-authorization-token" #You don't need to change it; it can automatically obtain token
language: "zh-Hans-CN"         #supportedLanguage by each storefront --> https://gist.github.com/itouakirai/c8ba9df9dc65bd300094103b058731d0
lrc-type: "lyrics"   #lyrics or syllable-lyrics
lrc-format: "lrc"   #lrc or ttml
embed-lrc: true
save-lrc-file: false
save-artist-cover: false
save-animated-artwork: false    # If enabled, requires ffmpeg
emby-animated-artwork: false    # If enabled, requires ffmpeg
embed-cover: true
cover-size: 5000x5000
cover-format: jpg       #jpg png or original
alac-save-folder: AM-DL downloads
atmos-save-folder: AM-DL-Atmos downloads
aac-save-folder: AM-DL-AAC downloads
max-memory-limit: 256 # MB
decrypt-m3u8-port: "127.0.0.1:10020"
get-m3u8-port: "127.0.0.1:20020"
get-m3u8-from-device: true
#set 'all' to retrieve all m3u8, and set 'hires' to only detect hires m3u8.
get-m3u8-mode: hires # all hires
aac-type: aac-lc # Default AAC profile (also used as Telegram /settings default): aac-lc aac aac-binaural aac-downmix
alac-max: 192000  #192000 96000 48000 44100
atmos-max: 2768  #2768 2448
limit-max: 200
#{AlbumId} {AlbumName} {ArtistName} {ReleaseDate} {ReleaseYear} {UPC} {Copyright} {Quality} {Codec} {Tag} {RecordLabel}
#example: {ReleaseYear} - {ArtistName} - {AlbumName}({AlbumId})({UPC})({Copyright}){Codec}
album-folder-format: "{AlbumName}"
#{PlaylistId} {PlaylistName} {ArtistName} {Quality} {Codec} {Tag}
playlist-folder-format: "{PlaylistName}"
#{SongId} {SongNumer} {SongName} {DiscNumber} {TrackNumber} {Quality} {Codec} {Tag}
#example: Disk {DiscNumber} - Track {TrackNumber} {SongName} [{Quality}]{{Tag}}"
song-file-format: "{SongNumer}. {SongName}"
#{ArtistId} {ArtistName}/{UrlArtistName}
#if artist-folder-format set "",will not make artist folder
artist-folder-format: "{UrlArtistName}"
#if set "" will not add tag
explicit-choice : "[E]"
clean-choice : "[C]"
apple-master-choice : "[M]"
#if set true,for playlst,will use songinfo for meta #albumname track disk
use-songinfo-for-playlist: false
#if set true,will download album cover for playlist
dl-albumcover-for-playlist: false
mv-audio-type: atmos  # Default MV audio profile (also used as Telegram /settings default): atmos ac3 aac
mv-max: 2160
# storefront will be used only in searching. 
# storefront is the 2-letter country code that are available in the urls (jp, ca, us etc.).
# if your account is from Japan, you must use jp.
# if the storefront is different from your account, you will see a "failed to get lyrics" error in most of the songs. By default the storefront is set to US if not set.
storefront: "us"
# Conversion settings
convert-after-download: false     # Enable post-download conversion (requires ffmpeg)
convert-format: "flac"            # flac | mp3 | opus | wav | copy (no re-encode)
convert-keep-original: false       # Keep original file after successful conversion
convert-skip-if-source-matches: true  # If already in target format, skip
ffmpeg-path: "ffmpeg"             # Override if ffmpeg is not in PATH
convert-extra-args: ""            # Additional raw args appended (advanced)
# Conversion warnings and behavior
convert-warn-lossy-to-lossless: true # If true, print a warning when converting a detected lossy source to a lossless container
convert-skip-lossy-to-lossless: true # If true, skip converting detected lossy sources to lossless target formats (flac/wav)
# Telegram bot settings
telegram-bot-token: ""            # Bot token or set TELEGRAM_BOT_TOKEN
telegram-api-url: ""              # Optional API base URL override (default: https://api.telegram.org). Avoid plain HTTP unless you trust the network.
telegram-http-timeout-sec: 180    # Telegram API request timeout for send/edit/upload calls
telegram-poll-timeout-sec: 75     # getUpdates long-poll HTTP timeout (should be > 30)
telegram-proxy-url: ""            # Optional explicit proxy for Telegram API, e.g. http://127.0.0.1:7890
telegram-no-proxy: false          # If true, ignore env proxy and telegram-proxy-url (direct connect)
telegram-allowed-chat-ids: []     # Optional chat ID allowlist
telegram-search-limit: 8          # Results per search
telegram-search-language: "zh-Hans"      # Optional search language override (e.g. zh-Hans, zh-Hant)
telegram-max-file-mb: 50          # Max file size to send
telegram-download-folder: ""      # Optional override for downloads
telegram-cache-file: "telegram-cache.json"           # Optional cache file for Telegram file_id reuse (song audio + MV + ZIP)
telegram-state-file: ""           # Runtime state snapshot path (pending panels + queued/in-flight tasks). Empty -> auto (cache basename + .state.json)
telegram-metrics-interval-sec: 60  # Periodic metrics/health log interval
telegram-resource-check-interval-sec: 30  # Resource guard re-check interval
telegram-min-free-disk-mb: 512    # Minimum free space required on download roots before accepting new tasks
telegram-min-free-tmp-mb: 256     # Minimum free space required on temp directory before accepting new tasks
telegram-max-memory-mb: 0         # Optional memory guard (0 = disabled, fallback to max-memory-limit/env if set)
telegram-download-max-gb: 3        # Cleanup quota for Telegram download folders
telegram-cleanup-interval-sec: 300  # Periodic janitor interval (incremental cleanup, no per-task full scan)
telegram-cleanup-scan-interval-sec: 1800 # Full scan fallback interval to heal drift
telegram-cleanup-protect-sec: 120   # New files younger than this are protected from janitor deletion

# AstrBot artifact janitor settings
astrbot-artifact-max-age-hours: 24  # Max artifact retention age
astrbot-artifact-max-size-mb: 2048  # Artifact quota (oldest-first eviction when exceeded)
astrbot-artifact-janitor-interval-sec: 120 # Background janitor interval
astrbot-artifact-protect-sec: 120   # Newly generated artifacts are protected for this duration
